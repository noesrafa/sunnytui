version: 2

project_name: sunnytui

before:
  hooks:
    - go mod tidy

builds:
  - id: sunnytui
    main: ./cmd/sunnytui
    binary: sunnytui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: sunnytui
    repository:
      owner: noesrafa
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/noesrafa/sunnytui"
    description: "TUI multiplexor de Claude Code"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "sunnytui"
      # Symlink so users can launch via the short `sunny` name.
      bin.install_symlink "sunnytui" => "sunny"
    test: |
      system "#{bin}/sunnytui", "--help"
      system "#{bin}/sunny", "--help"
